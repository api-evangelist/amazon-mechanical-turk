aid: amazon-mechanical-turk
name: Amazon Mechanical Turk
description: >-
  Amazon Mechanical Turk (MTurk) is a crowdsourcing marketplace that makes it
  easier for individuals and businesses to coordinate the use of human
  intelligence to perform tasks that computers are currently unable to do well.
  It enables access to a global, on-demand, 24x7 workforce.
