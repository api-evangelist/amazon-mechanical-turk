naftiko: "1.0.0-alpha1"

info:
  label: "Amazon Mechanical Turk Requester API"
  description: "Programmatic access to create and manage HITs, qualifications, workers, assignments, and bonuses for coordinating crowdsourced human intelligence tasks."
  tags:
    - Amazon
    - Mechanical Turk
    - Crowdsourcing
    - Human Intelligence
    - Tasks
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: mturk-requester
      baseUri: https://mturk-requester.us-east-1.amazonaws.com
      description: "Amazon Mechanical Turk Requester API for managing HITs and worker tasks."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: hits
          path: /
          description: "Human Intelligence Tasks (HITs) - the core unit of work in MTurk."
          operations:
            - name: create-hit
              method: POST
              description: "Create a new HIT."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  description: "{{tools.description}}"
                  reward: "{{tools.reward}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-hit
              method: POST
              description: "Get details of a specific HIT."
              body:
                type: json
                data:
                  HITId: "{{tools.hitId}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-hits
              method: POST
              description: "List all HITs for the requester account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-hit
              method: POST
              description: "Delete a HIT that has been completed or abandoned."
              body:
                type: json
                data:
                  HITId: "{{tools.hitId}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: assignments
          path: /
          description: "Worker assignments submitted for HITs."
          operations:
            - name: list-assignments-for-hit
              method: POST
              description: "List all assignments for a specific HIT."
              body:
                type: json
                data:
                  HITId: "{{tools.hitId}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-assignment
              method: POST
              description: "Get details of a specific assignment."
              body:
                type: json
                data:
                  AssignmentId: "{{tools.assignmentId}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: approve-assignment
              method: POST
              description: "Approve a completed assignment and release payment to the worker."
              body:
                type: json
                data:
                  AssignmentId: "{{tools.assignmentId}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: reject-assignment
              method: POST
              description: "Reject a completed assignment."
              body:
                type: json
                data:
                  AssignmentId: "{{tools.assignmentId}}"
                  RequesterFeedback: "{{tools.feedback}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: qualifications
          path: /
          description: "Qualification types and worker qualification management."
          operations:
            - name: create-qualification-type
              method: POST
              description: "Create a new qualification type."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-qualification-types
              method: POST
              description: "List all qualification types for the requester."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-qualification-type
              method: POST
              description: "Get details of a specific qualification type."
              body:
                type: json
                data:
                  QualificationTypeId: "{{tools.qualificationTypeId}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: workers
          path: /
          description: "Worker management including blocks, bonuses, and notifications."
          operations:
            - name: list-bonus-payments
              method: POST
              description: "List bonus payments made to workers."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-bonus
              method: POST
              description: "Pay a bonus to a worker for a completed assignment."
              body:
                type: json
                data:
                  WorkerId: "{{tools.workerId}}"
                  BonusAmount: "{{tools.bonusAmount}}"
                  AssignmentId: "{{tools.assignmentId}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: notify-workers
              method: POST
              description: "Send notification messages to workers."
              body:
                type: json
                data:
                  Subject: "{{tools.subject}}"
                  MessageText: "{{tools.messageText}}"
                  WorkerIds: "{{tools.workerIds}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-account-balance
              method: POST
              description: "Get the prepaid balance in the requester's MTurk account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: mturk-requester-api
      resources:
        - path: /v1/hits
          name: hits
          description: "HITs management"
          operations:
            - method: POST
              name: list-hits
              description: "List all HITs."
              call: "mturk-requester.list-hits"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/assignments
          name: assignments
          description: "Assignments management"
          operations:
            - method: POST
              name: list-assignments
              description: "List assignments for a HIT."
              call: "mturk-requester.list-assignments-for-hit"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: mturk-requester-mcp
      transport: http
      tools:
        - name: list-hits
          description: "List all Human Intelligence Tasks for the requester account."
          hints:
            readOnly: true
          call: "mturk-requester.list-hits"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-hit
          description: "Get details of a specific HIT."
          hints:
            readOnly: true
          call: "mturk-requester.get-hit"
          with:
            hitId: "tools.hitId"
          outputParameters:
            - type: object
              mapping: "$."
